version: 2

project_name: yunxiao

before:
  hooks:
    - go mod tidy

builds:
  - id: yunxiao
    main: ./cmd/yunxiao
    binary: yunxiao
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: yunxiao
    ids:
      - yunxiao
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_preview.{{ .Env.PREVIEW_ASSET_VERSION }}_{{ .Os }}_{{ .Arch }}
    wrap_in_directory: false

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Env.PREVIEW_VERSION }}"

changelog:
  use: git
  sort: asc
