name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal test)"
      - name: Run vet
        run: go vet ./...
      - name: Run tests
        run: go test ./...
      - name: Build binary
        run: go build -o yunxiao ./cmd/yunxiao
