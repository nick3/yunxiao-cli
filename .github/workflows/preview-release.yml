name: Preview Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: preview-release
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal test)"
      - name: Run vet
        run: go vet ./...
      - name: Run tests
        run: go test ./...
      - name: Build preview artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
      - name: Publish preview release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_TAG: preview
        run: |
          set -euo pipefail

          notes_file="${RUNNER_TEMP}/preview-notes.md"
          short_sha="${GITHUB_SHA::7}"

          cat > "${notes_file}" <<EOF
          Preview build from main @ ${GITHUB_SHA}.

          This prerelease is replaced on every push to main and is not a stable release.
          EOF

          if gh release view "${PREVIEW_TAG}" >/dev/null 2>&1; then
            gh release delete "${PREVIEW_TAG}" --cleanup-tag --yes
          fi

          gh release create "${PREVIEW_TAG}" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            --target "${GITHUB_SHA}" \
            --title "Preview (${short_sha})" \
            --notes-file "${notes_file}" \
            --prerelease \
            --latest=false
